    <style>
      /* Preloader: shown before React hydrates */
      body { margin: 0; background: #0c0908; }
      #root { min-height: 100dvh; display: flex; align-items: center; justify-content: center; }
      .preloader { display: flex; flex-direction: column; align-items: center; gap: 1.5rem; }
      .preloader-dot { width: 6px; height: 6px; border-radius: 50%; background: #7d6552; animation: cp-pulse 1.4s ease-in-out infinite both; }
      .preloader-dot:nth-child(2) { animation-delay: 0.16s; background: #a08870; }
      .preloader-dot:nth-child(3) { animation-delay: 0.32s; background: #c4a882; }
      .preloader-label { font-family: ui-monospace, monospace; font-size: 0.6rem; letter-spacing: 0.28em; text-transform: uppercase; color: #7d6552; }
      @keyframes cp-pulse { 0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; } 40% { transform: scale(1); opacity: 1; } }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="preloader">
        <div style="display:flex;gap:8px">
          <div class="preloader-dot"></div>
          <div class="preloader-dot"></div>
          <div class="preloader-dot"></div>
